<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Item</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 25px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 95%;
            padding: 8px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .save {
            background-color: #2c3e50;
            color: white;
        }

        .save:hover {
            background-color: #1a252f;
        }

        .reset {
            background-color: #bdc3c7;
        }

        .reset:hover {
            background-color: #95a5a6;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        a:hover {
            color: #1d6fa5;
        }
    </style>
</head>
<body>

<h1>Editar Item</h1>

<form th:action="@{/items/{id}/edit(id=${item.id})}" method="post">
    <label>Título:</label>
    <input type="text" name="title" th:value="${item.title}" required>
    <br><br>

    <label>Categoría:</label>
    <input type="text" name="category" th:value="${item.category}">
    <br><br>

    <label>Cantidad:</label>
    <input type="number" name="count" th:value="${item.count}">
    <br><br>

    <label>Fabricante:</label>
    <input type="text" name="manufacturer" th:value="${item.manufacturer}">
    <br><br>

    <button type="submit">Guardar cambios</button>
    <button type="reset">Limpiar</button>
</form>

<br>
<a href="/items">Volver</a>

</body>
</html>
